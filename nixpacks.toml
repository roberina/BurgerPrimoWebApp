[phases.setup]
nixPkgs = ["php84", "php84Packages.composer", "nodejs_20", "nodePackages.npm", "php84Extensions.pdo", "php84Extensions.pdo_sqlite", "php84Extensions.mbstring", "php84Extensions.tokenizer", "php84Extensions.xml", "php84Extensions.ctype", "php84Extensions.fileinfo", "php84Extensions.bcmath"]

[phases.build]
cmds = [
  "composer install --optimize-autoloader --no-dev --no-interaction",
  "npm ci",
  "npm run build",
  "mkdir -p storage/framework/cache/data storage/framework/sessions storage/framework/views storage/logs bootstrap/cache",
  "chmod -R 775 storage bootstrap/cache",
  "touch database/database.sqlite"
]

[start]
cmd = "mkdir -p /app/storage/framework/cache/data /app/storage/framework/sessions /app/storage/framework/views /app/storage/logs /app/bootstrap/cache && chmod -R 775 /app/storage /app/bootstrap/cache && php artisan migrate --force && php artisan db:seed --force --class=DatabaseSeeder 2>/dev/null || true && php artisan config:cache && php artisan route:cache && php artisan view:cache && php artisan serve --host=0.0.0.0 --port=$PORT"
